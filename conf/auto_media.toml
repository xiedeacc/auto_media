[app]
start_minimized = true
single_instance = true

[scheduler]
timezone = "Asia/Shanghai"
sleep_minutes = 10
cutoff_time = "21:00:00"
active_start_time = "20:00:00"
active_end_time = "21:00:00"
active_sleep_minutes = 3
run_immediately_on_start = true

[data]
dir = "data"
image_patterns = [
  "*{YYYYMMDDHHMMSS}*.jpg",
  "*{YYYYMMDDHHMMSS}*.jpeg",
  "*{YYYYMMDDHHMMSS}*.png",
  "*{YYYYMMDDHHMMSS}*.webp",
  "*{YYYYMMDD}_{HH}{mm}{SS}*.jpg",
  "*{YYYYMMDD}_{HH}{mm}{SS}*.jpeg",
  "*{YYYYMMDD}_{HH}{mm}{SS}*.png",
  "*{YYYYMMDD}_{HH}{mm}{SS}*.webp",
  "*{YYYY-MM-DD}_{HH}-{mm}-{SS}*.jpg",
  "*{YYYY-MM-DD}_{HH}-{mm}-{SS}*.jpeg",
  "*{YYYY-MM-DD}_{HH}-{mm}-{SS}*.png",
  "*{YYYY-MM-DD}_{HH}-{mm}-{SS}*.webp",
  "*{YYYY}年{MM}月{DD}日{HH}时{mm}分{SS}秒*.jpg",
  "*{YYYY}年{MM}月{DD}日{HH}时{mm}分{SS}秒*.jpeg",
  "*{YYYY}年{MM}月{DD}日{HH}时{mm}分{SS}秒*.png",
  "*{YYYY}年{MM}月{DD}日{HH}时{mm}分{SS}秒*.webp",
]
multi_image_policy = "newest"

[publish]
title_pattern = "挑战千万美金 - {YYYYMMDD}"
fallback_body_text = "挑战千万美金 - {YYYYMMDD}"
tags = ["#投资理财", "#投资", "#理财", "#美股", "#交易员", "#期权", "#期权交易", "#美股期权", "#投资挑战", "#实盘记录", "#账户盈利", "#交易复盘", "#富途", "#盈透", "#老虎"]
publish_platforms = ["xhs", "zhihu", "twitter"]

[platforms.xhs]
enabled = true
mode = "cdp"
login_url = "https://www.xiaohongshu.com"
creator_url = "https://creator.xiaohongshu.com"
write_url = "https://creator.xiaohongshu.com/publish/publish"
cdp_port = 9223

[platforms.zhihu]
enabled = true
mode = "cdp"
login_url = "https://www.zhihu.com/signin"
write_url = "https://zhuanlan.zhihu.com/write"
cdp_port = 9224

[platforms.twitter]
enabled = true
mode = "cdp"
login_url = "https://x.com/i/flow/login"
creator_url = "https://x.com"
write_url = "https://x.com/home"
cdp_port = 9225

[startup]
enabled = true
minimize_to_tray_on_autostart = true
