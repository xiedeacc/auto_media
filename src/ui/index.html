<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto Media</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Auto Media</h1>
          <p id="message">加载中</p>
        </div>
        <div class="actions">
          <button id="manual-post" type="button">手动发文</button>
          <button id="run-now" type="button">立即检测</button>
          <button id="pause-toggle" type="button">启动</button>
          <button id="logs-button" type="button">日志</button>
        </div>
      </header>

      <section class="status-grid">
        <article class="panel">
          <span class="label">运行状态</span>
          <strong id="state">-</strong>
          <small id="last-tick">-</small>
        </article>
        <article class="panel">
          <span class="label">最近检测</span>
          <strong id="recent-check">-</strong>
          <span class="label stacked">下次唤醒</span>
          <strong id="next-wakeup">-</strong>
          <small>每 10 分钟检测一次</small>
        </article>
        <article class="panel">
          <span class="label">开机自启动</span>
          <label class="switch">
            <input id="autostart" type="checkbox" />
            <span></span>
          </label>
          <small>当前用户启动项</small>
        </article>
      </section>

      <section class="workspace">
        <div class="platforms">
          <article class="platform">
            <div>
              <span class="label">小红书</span>
              <strong>CDP</strong>
              <small class="platform-status unknown" data-platform-status="xhs">检测中</small>
            </div>
            <button data-login="xhs" type="button">登录</button>
          </article>
          <article class="platform">
            <div>
              <span class="label">知乎</span>
              <strong>CDP</strong>
              <small class="platform-status unknown" data-platform-status="zhihu">检测中</small>
            </div>
            <button data-login="zhihu" type="button">登录</button>
          </article>
          <article class="platform">
            <div>
              <span class="label">Twitter/X</span>
              <strong>CDP</strong>
              <small class="platform-status unknown" data-platform-status="twitter">检测中</small>
            </div>
            <button data-login="twitter" type="button">登录</button>
          </article>
          <article class="platform">
            <div>
              <span class="label">雪球</span>
              <strong>CDP</strong>
              <small class="platform-status unknown" data-platform-status="xueqiu">检测中</small>
            </div>
            <button data-login="xueqiu" type="button">登录</button>
          </article>
          <article class="platform">
            <div>
              <span class="label">抖音</span>
              <strong>CDP</strong>
              <small class="platform-status unknown" data-platform-status="douyin">检测中</small>
            </div>
            <button data-login="douyin" type="button">登录</button>
          </article>
        </div>

        <div class="panel wide">
          <div class="section-head">
            <h2>最近任务</h2>
            <div class="dir-actions">
              <button id="clear-records" type="button">清理</button>
              <button data-open="data" type="button">data</button>
              <button data-open="logs" type="button">logs</button>
              <button data-open="conf" type="button">conf</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>平台</th>
                  <th>状态</th>
                  <th>次数</th>
                  <th>更新时间</th>
                  <th>消息</th>
                </tr>
              </thead>
              <tbody id="records">
                <tr>
                  <td colspan="5">暂无任务</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <div id="manual-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop" data-close-manual></div>
      <section class="modal-panel">
        <header class="modal-head">
          <h2>手动发文</h2>
          <button class="icon-button" data-close-manual type="button">×</button>
        </header>
        <div class="manual-form">
          <div class="manual-choice-row">
            <div class="form-field">
              <span class="label">模板</span>
              <select id="manual-template" class="select-input">
                <option value="trade" selected>交易模板</option>
                <option value="normal">普通模板</option>
              </select>
            </div>
            <div class="form-field">
              <span class="label">平台</span>
              <div class="platform-picker">
                <label>
                  <input type="checkbox" name="manual-platform" value="xhs" checked />
                  <span>小红书</span>
                </label>
                <label>
                  <input type="checkbox" name="manual-platform" value="zhihu" checked />
                  <span>知乎</span>
                </label>
                <label>
                  <input type="checkbox" name="manual-platform" value="twitter" checked />
                  <span>Twitter/X</span>
                </label>
                <label>
                  <input type="checkbox" name="manual-platform" value="xueqiu" checked />
                  <span>雪球</span>
                </label>
                <label>
                  <input type="checkbox" name="manual-platform" value="douyin" checked />
                  <span>抖音</span>
                </label>
              </div>
            </div>
          </div>
          <label>
            <span class="label">标题</span>
            <input id="manual-title" class="text-input" type="text" placeholder="输入文章标题" />
          </label>
          <div class="form-field">
            <span class="label">图片</span>
            <div class="image-picker">
              <button id="select-images" type="button">添加图片</button>
              <span id="image-count">未选择图片，可按 Ctrl+V 粘贴</span>
            </div>
          </div>
          <div id="image-list" class="image-list"></div>
          <label>
            <span class="label">正文</span>
            <textarea id="manual-text" rows="7" placeholder="输入图文正文"></textarea>
          </label>
          <label>
            <span class="label">标签</span>
            <textarea id="manual-tags" rows="3" placeholder="输入标签，空格分隔"></textarea>
          </label>
        </div>
        <footer class="modal-actions">
          <button data-close-manual type="button">取消</button>
          <button id="submit-manual" type="button">发送</button>
        </footer>
      </section>
    </div>
    <div id="logs-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop" data-close-logs></div>
      <section class="modal-panel logs-panel">
        <header class="modal-head">
          <h2>日志</h2>
          <button class="icon-button" data-close-logs type="button">×</button>
        </header>
        <pre id="logs-content" class="logs-content">加载中</pre>
      </section>
    </div>
    <div id="image-preview-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop" data-close-preview></div>
      <section class="modal-panel image-preview-panel">
        <header class="modal-head">
          <h2>图片预览</h2>
          <button class="icon-button" data-close-preview type="button">×</button>
        </header>
        <div class="image-preview-body">
          <img id="preview-image" alt="图片预览" />
        </div>
        <p id="preview-caption" class="image-preview-caption"></p>
      </section>
    </div>
    <div id="progress-modal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-backdrop"></div>
      <section class="modal-panel progress-panel">
        <header class="modal-head">
          <h2 id="progress-title">发送进度</h2>
          <button id="close-progress" class="icon-button" type="button">×</button>
        </header>
        <div id="progress-list" class="progress-list"></div>
      </section>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
